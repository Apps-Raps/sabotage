server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve theme files with their real extensions; force download-friendly types.
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg;
        image/jpeg                            jpg jpeg;
        text/plain                            txt toml conf vim yaml zsh itermcolors icls sublime-color-scheme;
    }
    default_type text/plain;

    # Real files resolve first (downloads under /packs, /docs); SPA-ish fallback otherwise.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for generated theme assets and fonts; HTML stays fresh.
    location ~* \.(css|js|mjs|svg|jpg|jpeg|png|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    location = /index.html { add_header Cache-Control "no-cache"; }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
