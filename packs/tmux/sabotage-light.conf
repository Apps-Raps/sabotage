# Sabotage — Light
# Sabotage theme. Add to ~/.tmux.conf:  source-file ~/.tmux/sabotage-light.conf

set -g status on
set -g status-style "bg=#f1f2f6,fg=#1a1c24"
set -g status-left-length 30
set -g status-left "#[bg=#dd5040,fg=#fbfbfd,bold] #S #[bg=#f1f2f6,fg=#f1f2f6] "
set -g status-right "#[fg=#5a5b63] %Y-%m-%d #[fg=#dd5040]%H:%M "

setw -g window-status-format "#[fg=#9395a0] #I:#W "
setw -g window-status-current-format "#[bg=#e7e8ee,fg=#dd5040,bold] #I:#W "
setw -g window-status-activity-style "fg=#b7791f"

set -g pane-border-style "fg=#dddee6"
set -g pane-active-border-style "fg=#dd5040"

set -g message-style "bg=#dd5040,fg=#fbfbfd"
set -g message-command-style "bg=#f1f2f6,fg=#1a1c24"
set -g mode-style "bg=#cfe0f5,fg=#1a1c24"
set -g display-panes-active-colour "#dd5040"
set -g display-panes-colour "#9395a0"
set -g clock-mode-colour "#dd5040"
