# Sabotage — Dark
# Sabotage theme. Add to ~/.tmux.conf:  source-file ~/.tmux/sabotage-dark.conf

set -g status on
set -g status-style "bg=#1a1c24,fg=#e8e8ea"
set -g status-left-length 30
set -g status-left "#[bg=#dd5040,fg=#0d0e11,bold] #S #[bg=#1a1c24,fg=#1a1c24] "
set -g status-right "#[fg=#a8a9b0] %Y-%m-%d #[fg=#dd5040]%H:%M "

setw -g window-status-format "#[fg=#5a5b63] #I:#W "
setw -g window-status-current-format "#[bg=#22242e,fg=#dd5040,bold] #I:#W "
setw -g window-status-activity-style "fg=#ffd166"

set -g pane-border-style "fg=#2a2c36"
set -g pane-active-border-style "fg=#dd5040"

set -g message-style "bg=#dd5040,fg=#0d0e11"
set -g message-command-style "bg=#1a1c24,fg=#e8e8ea"
set -g mode-style "bg=#2a3a52,fg=#e8e8ea"
set -g display-panes-active-colour "#dd5040"
set -g display-panes-colour "#5a5b63"
set -g clock-mode-colour "#dd5040"
